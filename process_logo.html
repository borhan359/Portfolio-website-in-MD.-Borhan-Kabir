<!DOCTYPE html>
<html>
<head>
    <title>Process Logo</title>
</head>
<body>
    <img id="inputImg" style="display:none;">
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="output" style="word-break: break-all; font-family: monospace; white-space: pre-wrap;">Processing...</div>

    <script>
        const inputImg = document.getElementById('inputImg');
        const canvas = document.getElementById('canvas');
        const output = document.getElementById('output');

        // The base64 will be injected here
        const base64Data = "IMAGE_BASE64_PLACEHOLDER";

        inputImg.onload = function() {
            canvas.width = inputImg.width;
            canvas.height = inputImg.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(inputImg, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // Threshold for "dark" background
            const threshold = 60;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                // If the pixel is dark, make it transparent
                if (r < threshold && g < threshold && b < threshold) {
                    data[i + 3] = 0;
                }
            }

            ctx.putImageData(imageData, 0, 0);
            const finalBase64 = canvas.toDataURL('image/png');
            output.textContent = finalBase64;
            console.log("DONE_PROCESSING");
        };

        inputImg.src = "data:image/jpeg;base64," + base64Data;
    </script>
</body>
</html>
